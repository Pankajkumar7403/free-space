name: CI Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  REGISTRY:   ghcr.io
  IMAGE_NAME: ${{ github.repository_owner }}/qommunity-api

jobs:
  # -- 1. Lint -----------------------------------------------------------------
  lint:
    name: "Lint & Format"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v3
        with: { version: "latest" }
      - name: Install dev dependencies
        run: cd backend && uv sync --dev --frozen
      - name: Ruff check
        run: cd backend && uv run ruff check .
      - name: Black check
        run: cd backend && uv run black --check .

  # -- 2. Type check -----------------------------------------------------------
  type-check:
    name: "Type Check"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v3
      - run: cd backend && uv sync --dev --frozen
      - name: Mypy
        run: |
          cd backend && uv run mypy apps/ core/ \
            --ignore-missing-imports \
            --exclude migrations

  # -- 3. Unit & Integration Tests ---------------------------------------------
  test:
    name: "Tests (unit + integration)"
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB:       qommunity_test
          POSTGRES_USER:     qommunity
          POSTGRES_PASSWORD: ci_test_password
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports: ["5432:5432"]

      redis:
        image: redis:7-alpine
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports: ["6379:6379"]

    env:
      DATABASE_URL:              postgresql://qommunity:ci_test_password@localhost:5432/qommunity_test
      REDIS_URL:                 redis://localhost:6379/0
      DJANGO_SETTINGS_MODULE:   config.settings.testing
      SECRET_KEY:                ci-secret-key-not-for-production-use
      AWS_ACCESS_KEY_ID:         test
      AWS_SECRET_ACCESS_KEY:     test
      AWS_STORAGE_BUCKET_NAME:   test-bucket
      AWS_S3_ENDPOINT_URL:       http://localhost:9000
      CELERY_TASK_ALWAYS_EAGER: "True"

    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v3
      - run: cd backend && uv sync --dev --frozen
      - name: Run migrations
        run: cd backend && uv run python manage.py migrate --run-syncdb
      - name: Run unit tests
        run: |
          cd backend && uv run pytest apps/ core/ \
            -m "not integration" \
            --cov=apps \
            --cov=core \
            --cov-report=xml:coverage.xml \
            --cov-report=term-missing \
            --cov-fail-under=75 \
            -v \
            --tb=short
      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          file:  backend/coverage.xml
          flags: unit-tests
        continue-on-error: true

  # -- 4. Security scan --------------------------------------------------------
  security:
    name: "Security Scan"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v3
      - run: cd backend && uv sync --dev --frozen
      - name: Bandit SAST scan
        run: |
          cd backend && uv run bandit \
            -r apps/ core/ \
            -ll \
            --exclude "*/tests/*,*/migrations/*" \
            -f json \
            -o bandit-report.json
        continue-on-error: true
      - name: Safety dependency vulnerability scan
        run: cd backend && uv run safety check --full-report
        continue-on-error: true
      - name: Django deployment check
        run: |
          cd backend && uv run python manage.py check --deploy \
            --settings=config.settings.production \
            --fail-level WARNING
        env:
          SECRET_KEY:       production-grade-secret-key-for-ci-check
          DATABASE_URL:     postgresql://x:x@localhost:5432/x
          REDIS_URL:        redis://localhost:6379/0
          ALLOWED_HOSTS:    api.qommunity.app
          CORS_ALLOWED_ORIGINS: https://qommunity.app
        continue-on-error: true
      - name: Upload security reports
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: security-reports
          path: backend/bandit-report.json

  # -- 5. Build & Push Docker image --------------------------------------------
  build:
    name: "Build & Push"
    needs: [lint, type-check, test, security]
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=sha,prefix=sha-
            type=raw,value=latest,enable={{is_default_branch}}
      - name: Build and push image
        uses: docker/build-push-action@v5
        with:
          context:    ./backend
          file:       ./backend/Dockerfile
          push:       true
          tags:       ${{ steps.meta.outputs.tags }}
          labels:     ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to:   type=gha,mode=max
          build-args: |
            APP_VERSION=${{ github.sha }}
